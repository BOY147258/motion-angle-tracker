<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MotionLab Pro — 动作对比</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#05080f;--s1:#0a1628;--border:rgba(6,214,160,.12);--a1:#06d6a0;--a2:#7c5bf5;--a3:#00d4ff;--text:#e8f0ff;--dim:#4a6080;--font:'SF Mono','JetBrains Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

.toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--s1)}
.toolbar .title{font-size:13px;font-weight:700;color:var(--a2);margin-right:auto}
.toolbar button{padding:6px 12px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--text);font:11px var(--font);cursor:pointer}
.toolbar button:hover{border-color:var(--a1)}
.toolbar a{color:var(--dim);font-size:11px;text-decoration:none}

.compare{flex:1;display:flex;gap:2px;overflow:hidden}
@media(max-width:600px){.compare{flex-direction:column}}
.pane{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
.pane video{max-width:100%;max-height:100%;object-fit:contain}
.pane canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.pane-label{position:absolute;top:8px;left:8px;font-size:10px;padding:3px 8px;border-radius:4px;z-index:2}
.pane-label.a{background:rgba(6,214,160,.2);color:var(--a1);border:1px solid rgba(6,214,160,.3)}
.pane-label.b{background:rgba(124,91,245,.2);color:var(--a2);border:1px solid rgba(124,91,245,.3)}
.drop{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--dim);font-size:12px;gap:8px;cursor:pointer}
.drop.hidden{display:none}
.drop .icon{font-size:36px}
.drop input{display:none}

.controls{padding:8px 16px;border-top:1px solid var(--border);background:var(--s1);display:flex;align-items:center;gap:10px;justify-content:center}
.controls button{padding:6px 14px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--text);font:12px var(--font);cursor:pointer}
.controls button:hover{border-color:var(--a1)}
</style>
</head>
<body>

<div class="toolbar">
  <span class="title">⚖️ 动作对比</span>
  <button onclick="syncPlay()">▶ 同步播放</button>
  <button onclick="syncPause()">⏸ 暂停</button>
  <button onclick="syncReset()">⏮ 重置</button>
  <a href="index.html">← 返回</a>
</div>

<div class="compare">
  <div class="pane" id="pane-a">
    <span class="pane-label a">A</span>
    <video id="vid-a" playsinline muted></video>
    <canvas id="cv-a"></canvas>
    <div class="drop" id="drop-a" onclick="document.getElementById('file-a').click()">
      <span class="icon">🅰️</span><span>导入视频 A</span>
      <input type="file" id="file-a" accept="video/*">
    </div>
  </div>
  <div class="pane" id="pane-b">
    <span class="pane-label b">B</span>
    <video id="vid-b" playsinline muted></video>
    <canvas id="cv-b"></canvas>
    <div class="drop" id="drop-b" onclick="document.getElementById('file-b').click()">
      <span class="icon">🅱️</span><span>导入视频 B</span>
      <input type="file" id="file-b" accept="video/*">
    </div>
  </div>
</div>

<div class="controls">
  <button onclick="stepBoth(-1)">◀ -1帧</button>
  <button onclick="stepBoth(1)">+1帧 ▶</button>
</div>

<script>
const CONNS=[[11,13],[13,15],[12,14],[14,16],[11,12],[11,23],[12,24],[23,24],[23,25],[24,26],[25,27],[26,28]];
let poseA=null,poseB=null;

document.getElementById('file-a').addEventListener('change',e=>{if(e.target.files[0])loadPane('a',e.target.files[0])});
document.getElementById('file-b').addEventListener('change',e=>{if(e.target.files[0])loadPane('b',e.target.files[0])});

function loadPane(id,file){
  const vid=document.getElementById('vid-'+id);
  vid.src=URL.createObjectURL(file);vid.load();
  vid.onloadedmetadata=()=>{
    document.getElementById('drop-'+id).classList.add('hidden');
    const cv=document.getElementById('cv-'+id);cv.width=vid.videoWidth;cv.height=vid.videoHeight;
    initPoseFor(id);
  };
}
function initPoseFor(id){
  const p=new Pose({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`});
  p.setOptions({modelComplexity:1,smoothLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
  p.onResults(r=>drawSkeleton(id,r));
  if(id==='a')poseA=p;else poseB=p;
}
function drawSkeleton(id,r){
  const cv=document.getElementById('cv-'+id);const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  if(!r.poseLandmarks)return;
  const lms=r.poseLandmarks,w=cv.width,h=cv.height;
  const color=id==='a'?'rgba(6,214,160,.5)':'rgba(124,91,245,.5)';
  ctx.strokeStyle=color;ctx.lineWidth=2;
  CONNS.forEach(([a,b])=>{const la=lms[a],lb=lms[b];if(la.visibility>.4&&lb.visibility>.4){ctx.beginPath();ctx.moveTo(la.x*w,la.y*h);ctx.lineTo(lb.x*w,lb.y*h);ctx.stroke()}});
  lms.forEach(p=>{if(p.visibility>.4){ctx.beginPath();ctx.arc(p.x*w,p.y*h,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill()}});
}
function analyzePane(id){
  const vid=document.getElementById('vid-'+id);const p=id==='a'?poseA:poseB;
  if(vid.readyState>=2&&p)p.send({image:vid});
}

function syncPlay(){
  const a=document.getElementById('vid-a'),b=document.getElementById('vid-b');
  if(a.src)a.play();if(b.src)b.play();
  requestAnimationFrame(function loop(){analyzePane('a');analyzePane('b');if(!a.paused||!b.paused)requestAnimationFrame(loop)});
}
function syncPause(){document.getElementById('vid-a').pause();document.getElementById('vid-b').pause()}
function syncReset(){const a=document.getElementById('vid-a'),b=document.getElementById('vid-b');a.currentTime=0;b.currentTime=0;analyzePane('a');analyzePane('b')}
function stepBoth(dir){
  ['a','b'].forEach(id=>{const v=document.getElementById('vid-'+id);v.currentTime=Math.max(0,v.currentTime+dir/30);setTimeout(()=>analyzePane(id),50)});
}
</script>
</body>
</html>
