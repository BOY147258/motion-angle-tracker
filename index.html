<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotionAngle Pro v3.0 — 运动分析系统</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080f;--panel:#0a0f1e;--card:#0f1528;--border:#151d35;
  --text:#d6def0;--dim:#4a5a7a;--accent:#00f0ff;--accent2:#7c5bf5;
  --green:#00e676;--red:#ff3d5a;--orange:#ff9100;--blue:#448aff;
  --glow:0 0 20px rgba(0,240,255,.15);
  --font:'SF Mono','JetBrains Mono','Cascadia Code',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-user-select:none;user-select:none}

/* HEADER */
.header{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--panel);border-bottom:1px solid var(--border);backdrop-filter:blur(10px)}
.logo{font-size:14px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.status-bar{display:flex;gap:16px;font-size:11px;align-items:center}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-on{background:var(--green);box-shadow:0 0 6px var(--green)}.dot-off{background:var(--dim)}.dot-rec{background:var(--red);animation:pulse .6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.badge{font-size:9px;padding:2px 8px;border-radius:10px;background:rgba(0,240,255,.08);border:1px solid rgba(0,240,255,.2);color:var(--accent)}

/* MAIN LAYOUT */
.main{display:flex;height:calc(100vh - 42px)}

/* VIDEO AREA */
.video-area{flex:1;position:relative;background:#000;overflow:hidden}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2}
#video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain}
#videoFile{display:none}
.placeholder{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--dim);font-size:13px;text-align:center;z-index:1;line-height:2.2}
.placeholder .icon{font-size:48px;display:block;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(0,240,255,.3))}
.load-bar{width:220px;height:3px;background:var(--border);border-radius:2px;margin:12px auto;overflow:hidden}
.load-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;border-radius:2px;transition:width .3s}

/* Toolbar */
.toolbar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:4px;background:rgba(6,8,15,.9);padding:6px 14px;border-radius:10px;border:1px solid var(--border);backdrop-filter:blur(8px)}
.toolbar button{font:11px/1 var(--font);padding:5px 10px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--dim);cursor:pointer;transition:all .15s}
.toolbar button.on{color:var(--accent);border-color:var(--accent);background:rgba(0,240,255,.06);box-shadow:var(--glow)}
.toolbar button:hover{border-color:var(--text);color:var(--text)}

/* Source tabs */
.source-tabs{position:absolute;top:12px;left:12px;z-index:10;display:flex;gap:4px}
.source-tabs button{font:10px/1 var(--font);padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:rgba(6,8,15,.8);color:var(--dim);cursor:pointer;transition:all .15s}
.source-tabs button.on{color:var(--accent);border-color:var(--accent);background:rgba(0,240,255,.08)}

/* REC */
.rec-badge{display:none;position:absolute;top:12px;right:12px;z-index:10;background:rgba(255,61,90,.9);color:#fff;font:11px var(--font);padding:4px 12px;border-radius:5px;align-items:center;gap:6px;box-shadow:0 0 12px rgba(255,61,90,.4)}
.rec-badge.show{display:flex}

/* RIGHT PANEL */
.panel{width:380px;min-width:380px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-section{padding:10px 16px;border-bottom:1px solid var(--border)}

/* View tabs */
.view-tabs{display:flex;gap:3px}
.view-tabs button{flex:1;padding:7px 0;font:11px var(--font);text-align:center;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--dim);cursor:pointer;transition:all .15s}
.view-tabs button.on{color:var(--accent2);border-color:var(--accent2);background:rgba(124,91,245,.08);box-shadow:0 0 10px rgba(124,91,245,.1)}

/* Controls */
.controls{display:flex;gap:6px;padding:10px 16px}
.controls button{flex:1;padding:9px 0;font:12px/1 var(--font);border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);cursor:pointer;transition:all .15s;font-weight:600}
.controls .rec-btn{border-color:var(--red);color:var(--red)}.controls .rec-btn.active{background:var(--red);color:#fff;box-shadow:0 0 12px rgba(255,61,90,.3)}
.controls .exp-btn{border-color:var(--green);color:var(--green)}.controls .exp-btn:hover:not(:disabled){background:var(--green);color:#000}
.controls .vid-btn{border-color:var(--blue);color:var(--blue)}.controls .vid-btn:hover:not(:disabled){background:var(--blue);color:#000}
.controls button:disabled{opacity:.2;cursor:default}

/* Angle Grid */
.data-scroll{flex:1;overflow-y:auto;padding:10px 16px}
.data-scroll::-webkit-scrollbar{width:3px}.data-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.section-title{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.angle-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.angle-cell{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;font-size:11px;transition:all .12s;cursor:pointer;min-height:32px}
.angle-cell:hover{border-color:var(--accent);background:rgba(0,240,255,.02)}
.angle-cell .label{color:var(--dim)}.angle-cell .value{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;min-width:55px;text-align:right;transition:color .1s}
.angle-cell .value.active{color:var(--accent)}.angle-cell .value.warn{color:var(--orange)}.angle-cell .value.off{color:var(--dim)}
.angle-cell.disabled{opacity:.25;border-color:transparent}
.angle-cell.left{border-left:2px solid var(--orange)}.angle-cell.right{border-left:2px solid var(--blue)}.angle-cell.center{border-left:2px solid var(--accent2)}

/* Chart */
.chart-container{padding:10px 16px;border-top:1px solid var(--border);height:140px;display:none}
.chart-container.show{display:block}
#angleChart{width:100%;height:100%}

/* Symmetry */
.symmetry{padding:8px 16px;border-top:1px solid var(--border)}
.sym-title{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px}
.sym-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.sym-row .sym-label{font-size:9px;color:var(--dim);width:22px;text-align:right}
.sym-track{flex:1;height:4px;background:var(--border);border-radius:2px;position:relative;overflow:hidden}
.sym-fill{height:100%;border-radius:2px;transition:width .15s}
.sym-fill.ok{background:var(--green)}.sym-fill.left{background:var(--orange)}.sym-fill.right{background:var(--blue)}
.sym-center{position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(255,255,255,.1)}

/* Warnings */
.warn-bar{padding:6px 16px;border-top:1px solid var(--border);display:none;font-size:10px;color:var(--orange);background:rgba(255,145,0,.04);align-items:center;gap:8px}
.warn-bar.show{display:flex}

/* Footer */
.footer{padding:8px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--dim);display:flex;justify-content:space-between}
.footer .highlight{color:var(--text);font-weight:600}
.footer .rec-time{color:var(--red);font-size:12px;font-weight:700}

@media(max-width:860px){.panel{width:320px;min-width:320px}}
@media(max-width:680px){.main{flex-direction:column}.panel{width:100%;min-width:0;max-height:45vh}.chart-container{height:100px}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">◈ MOTIONANGLE PRO</div>
  <div class="status-bar">
    <span><span class="status-dot dot-off" id="dotCam"></span>摄像头</span>
    <span><span class="status-dot dot-off" id="dotModel"></span>模型</span>
    <span><span class="status-dot dot-off" id="dotRec"></span><span id="statusText">待命</span></span>
    <span><span class="status-dot dot-off" id="dotDetect"></span><span id="detectText">无人</span></span>
    <span id="fpsText">— fps</span>
    <span class="badge">BlazePose · v3.0</span>
  </div>
</div>

<div class="main">
  <div class="video-area" id="videoArea">
    <canvas id="canvas"></canvas>
    <video id="video" playsinline muted></video>
    <input type="file" id="videoFile" accept="video/*,image/*">
    <div class="placeholder" id="placeholder">
      <span class="icon">⟡</span>
      <span id="placeholderText">初始化中...</span>
      <div class="load-bar"><div class="load-fill" id="loadFill"></div></div>
    </div>
    <div class="source-tabs" id="sourceTabs">
      <button class="on" data-src="camera">📷 摄像头</button>
      <button data-src="video">🎬 视频</button>
      <button data-src="image">🖼 图片</button>
    </div>
    <div class="rec-badge" id="recBadge"><span class="status-dot dot-rec"></span>REC</div>
    <div class="toolbar" id="toolbar">
      <button class="on" data-t="skeleton">🦴 骨架</button>
      <button class="on" data-t="angles">📐 角度</button>
      <button data-t="symmetry">⚖️ 对称</button>
      <button data-t="cog">🎯 重心</button>
      <button data-t="chart">📈 曲线</button>
      <button data-t="trace">✏️ 轨迹</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-section">
      <div class="view-tabs">
        <button class="on" data-v="front">正面 Front</button>
        <button data-v="side">侧面 Side</button>
        <button data-v="full">综合 All</button>
      </div>
    </div>
    <div class="controls">
      <button class="rec-btn" id="btnRec">⏺ 录制</button>
      <button class="exp-btn" id="btnExport" disabled>📊 Excel</button>
      <button class="vid-btn" id="btnVideo" disabled>🎬 视频</button>
    </div>
    <div class="data-scroll" id="dataScroll">
      <div class="section-title"><span>◈ 关节角度实时数据</span><span style="font-size:9px">点击开关</span></div>
      <div class="angle-grid" id="angleGrid"></div>
    </div>
    <div class="chart-container" id="chartContainer">
      <canvas id="angleChart"></canvas>
    </div>
    <div class="warn-bar" id="warnBar"><span class="status-dot dot-rec" style="background:var(--orange)"></span><span id="warnMsg"></span></div>
    <div class="symmetry">
      <div class="sym-title">⚖️ 左右对称度</div>
      <div class="sym-row"><span class="sym-label">肩</span><div class="sym-track"><div class="sym-fill ok" id="symShoulder" style="width:50%"></div><div class="sym-center"></div></div></div>
      <div class="sym-row"><span class="sym-label">肘</span><div class="sym-track"><div class="sym-fill ok" id="symElbow" style="width:50%"></div><div class="sym-center"></div></div></div>
      <div class="sym-row"><span class="sym-label">髋</span><div class="sym-track"><div class="sym-fill ok" id="symHip" style="width:50%"></div><div class="sym-center"></div></div></div>
      <div class="sym-row"><span class="sym-label">膝</span><div class="sym-track"><div class="sym-fill ok" id="symKnee" style="width:50%"></div><div class="sym-center"></div></div></div>
    </div>
    <div class="footer">
      <span>⏱ <span class="rec-time" id="recTime">—</span></span>
      <span>帧 <span class="highlight" id="frameCount">0</span></span>
      <span>检测 <span class="highlight" id="confidence">—</span></span>
      <span>异常 <span style="color:var(--orange)" id="outlierCount">0</span></span>
    </div>
  </div>
</div>

<script>
// ============================================================
//  CONFIG & STATE
// ============================================================
const C = {
  outlierDeg: 25,
  smoothing: 0.3,
  chartMaxPoints: 120,
  traceMaxPoints: 60
};

const LANDMARKS = {
  lShoulder:11, rShoulder:12, lElbow:13, rElbow:14, lWrist:15, rWrist:16,
  lHip:23, rHip:24, lKnee:25, rKnee:26, lAnkle:27, rAnkle:28
};

const ANGLE_MAP = [
  ['lShoulder','左肩',[[13,11,23]],'left'],
  ['rShoulder','右肩',[[14,12,24]],'right'],
  ['lElbow','左肘',[[11,13,15]],'left'],
  ['rElbow','右肘',[[12,14,16]],'right'],
  ['lWrist','左腕',[[13,15,19]],'left'],
  ['rWrist','右腕',[[14,16,20]],'right'],
  ['lHip','左髋',[[11,23,25]],'left'],
  ['rHip','右髋',[[12,24,26]],'right'],
  ['lKnee','左膝',[[23,25,27]],'left'],
  ['rKnee','右膝',[[24,26,28]],'right'],
  ['lAnkle','左踝',[[25,27,31]],'left'],
  ['rAnkle','右踝',[[26,28,32]],'right'],
  ['neck','颈部',[[0,11,12]],'center'],
  ['trunk','躯干',[[11,23,25]],'center'],
  ['lHipFlex','左髋屈',[[12,24,26]],'left'],
  ['rHipFlex','右髋屈',[[11,23,25]],'right'],
];

const VIEW_KEYS = {
  front:['lShoulder','rShoulder','lElbow','rElbow','lHip','rHip','lKnee','rKnee','lWrist','rWrist'],
  side:['neck','trunk','lHipFlex','rHipFlex','lKnee','rKnee','lAnkle','rAnkle'],
  full:null
};

const ALL_KEYS = ANGLE_MAP.map(a=>a[0]);

let S = {
  source:'camera', view:'front', cameraOn:false, modelReady:false,
  isRec:false, recData:[], recChunks:[], recStart:0, mRec:null, recTimer:null,
  outlierCount:0, frameCount:0, lastAngles:{}, prevAngles:{},
  enabled:{}, markers:{skeleton:true,angles:true,symmetry:false,cog:false,chart:false,trace:false},
  tracePoints:[], chartData:{}, chart:null, landmarks:null, fps:0, lastTime:0, fpsFrames:0
};

ALL_KEYS.forEach(k => S.enabled[k] = true);

// ============================================================
//  INIT
// ============================================================
let pose, video, canvas, ctx;

function init() {
  video = document.getElementById('video');
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  buildAngleGrid();
  bindUI();
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  startCamera();
}

function resizeCanvas() {
  const c = document.getElementById('videoArea');
  canvas.width = c.clientWidth;
  canvas.height = c.clientHeight;
}

// ============================================================
//  CAMERA / VIDEO / IMAGE SOURCE
// ============================================================
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    video.srcObject = stream;
    await video.play();
    S.cameraOn = true;
    document.getElementById('dotCam').className = 'status-dot dot-on';
    document.getElementById('placeholder').style.display = 'none';
    loadPose();
  } catch(e) {
    document.getElementById('placeholderText').textContent = '摄像头访问失败: ' + e.message;
  }
}

function stopCamera() {
  if(video.srcObject) { video.srcObject.getTracks().forEach(t=>t.stop()); video.srcObject=null; }
  S.cameraOn = false;
  S.landmarks = null;
  document.getElementById('dotCam').className = 'status-dot dot-off';
}

function loadVideoFile() {
  document.getElementById('videoFile').accept = 'video/*';
  document.getElementById('videoFile').onchange = (e) => {
    const file = e.target.files[0]; if(!file) return;
    stopCamera();
    const url = URL.createObjectURL(file);
    video.src = url; video.loop = true; video.play();
    S.cameraOn = true;
    document.getElementById('dotCam').className = 'status-dot dot-on';
    document.getElementById('placeholder').style.display = 'none';
    if(!S.modelReady) loadPose(); else detectLoop();
  };
  document.getElementById('videoFile').click();
}

function loadImageFile() {
  document.getElementById('videoFile').accept = 'image/*';
  document.getElementById('videoFile').onchange = (e) => {
    const file = e.target.files[0]; if(!file) return;
    stopCamera();
    const img = new Image();
    img.onload = () => {
      canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);
      video.style.display = 'none';
      document.getElementById('placeholder').style.display = 'none';
      if(S.modelReady) { pose.send({image:img}); }
      else { loadPose().then(()=>pose.send({image:img})); }
    };
    img.src = URL.createObjectURL(file);
  };
  document.getElementById('videoFile').click();
}

// ============================================================
//  MEDIAPIPE POSE
// ============================================================
async function loadPose() {
  const fill = document.getElementById('loadFill');
  fill.style.width = '30%';
  document.getElementById('placeholderText').textContent = '加载 AI 模型...';

  pose = new Pose({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`});
  pose.setOptions({modelComplexity:1,smoothLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
  pose.onResults(onResults);

  await pose.initialize();
  S.modelReady = true;
  fill.style.width = '100%';
  document.getElementById('dotModel').className = 'status-dot dot-on';
  document.getElementById('placeholder').style.display = 'none';
  detectLoop();
}

function detectLoop() {
  if(!S.cameraOn || !S.modelReady) return;
  if(video.readyState >= 2) {
    pose.send({image:video}).then(()=>requestAnimationFrame(detectLoop));
  } else {
    requestAnimationFrame(detectLoop);
  }
}

function onResults(results) {
  if(!results.poseLandmarks) { S.landmarks=null; updateDetectStatus(false); return; }
  S.landmarks = results.poseLandmarks;
  S.frameCount++;
  updateDetectStatus(true);
  updateFPS();

  const angles = calcAllAngles();
  const flags = detectOutliers(angles);
  S.lastAngles = angles;

  draw(angles, flags);
  updateAngleGrid(angles, flags);
  updateSymmetry(angles);
  updateWarn(flags);
  if(S.markers.chart) updateChart(angles);
  if(S.isRec) recordFrame(angles, flags);
}

// ============================================================
//  ANGLE CALCULATION
// ============================================================
function calcAngle3P(lms, a, b, c) {
  const la=lms[a], lb=lms[b], lc=lms[c];
  if(!la||!lb||!lc||la.visibility<0.4||lb.visibility<0.4||lc.visibility<0.4) return null;
  const ba={x:la.x-lb.x,y:la.y-lb.y}, bc={x:lc.x-lb.x,y:lc.y-lb.y};
  const dot=ba.x*bc.x+ba.y*bc.y;
  const mag=Math.sqrt(ba.x**2+ba.y**2)*Math.sqrt(bc.x**2+bc.y**2);
  if(mag===0) return null;
  return Math.round(Math.acos(Math.max(-1,Math.min(1,dot/mag)))*180/Math.PI*10)/10;
}

function calcAllAngles() {
  const a={};
  ANGLE_MAP.forEach(([key,,pts])=>{
    if(!S.enabled[key]) return;
    a[key] = calcAngle3P(S.landmarks, pts[0][0], pts[0][1], pts[0][2]);
  });
  return a;
}

function detectOutliers(angles) {
  const flags=[];
  ALL_KEYS.forEach(k=>{
    if(angles[k]!=null && S.prevAngles[k]!=null) {
      if(Math.abs(angles[k]-S.prevAngles[k])>C.outlierDeg) { flags.push(k); S.outlierCount++; }
    }
  });
  S.prevAngles = {...angles};
  return flags;
}

// ============================================================
//  DRAWING
// ============================================================
function draw(angles, flags) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!S.landmarks) return;
  const w=canvas.width, h=canvas.height, lms=S.landmarks;

  if(S.markers.skeleton) drawSkeleton(lms,w,h);
  if(S.markers.angles) drawAngleLabels(lms,angles,flags,w,h);
  if(S.markers.symmetry) drawSymOverlay(angles,w,h);
  if(S.markers.cog) drawCOG(lms,w,h);
  if(S.markers.trace) drawTrace(lms,w,h);
  drawViewBadge(w);
}

function drawSkeleton(lms,w,h) {
  const conns=[[11,13],[13,15],[12,14],[14,16],[11,12],[11,23],[12,24],[23,24],[23,25],[24,26],[25,27],[26,28],[27,29],[28,30],[27,31],[28,32],[15,17],[15,19],[16,18],[16,20]];
  // Glow effect
  ctx.shadowColor='rgba(0,240,255,.3)';ctx.shadowBlur=6;
  ctx.strokeStyle='rgba(0,240,255,.5)';ctx.lineWidth=2;
  conns.forEach(([a,b])=>{
    const la=lms[a],lb=lms[b];
    if(la&&lb&&la.visibility>.5&&lb.visibility>.5){
      ctx.beginPath();ctx.moveTo(la.x*w,la.y*h);ctx.lineTo(lb.x*w,lb.y*h);ctx.stroke();
    }
  });
  ctx.shadowBlur=0;

  // Joints
  lms.forEach((lm,i)=>{
    if(lm.visibility>.5){
      ctx.beginPath();ctx.arc(lm.x*w,lm.y*h,4,0,Math.PI*2);
      ctx.fillStyle='rgba(0,240,255,.8)';ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
    }
  });
}

function drawAngleLabels(lms,angles,flags,w,h) {
  const fs=Math.max(11,w/110);
  ctx.font=`bold ${fs}px "JetBrains Mono",monospace`;ctx.textAlign='center';ctx.textBaseline='middle';

  ANGLE_MAP.forEach(([key,,pts,side])=>{
    if(!S.enabled[key]||angles[key]==null) return;
    const vk=VIEW_KEYS[S.view];
    if(vk&&!vk.includes(key)) return;
    const idx=pts[0][1];
    const lm=lms[idx];
    if(!lm||lm.visibility<.4) return;
    const x=lm.x*w, y=lm.y*h-22;
    const t=`${angles[key]}°`;
    const m=ctx.measureText(t);
    const bw=m.width+12, bh=20;
    const isFlag=flags.includes(key);
    const col=side==='left'?'#ff9100':side==='right'?'#448aff':'#7c5bf5';

    ctx.fillStyle='rgba(0,0,0,.75)';
    ctx.beginPath();ctx.roundRect(x-bw/2,y-bh/2,bw,bh,3);ctx.fill();
    ctx.strokeStyle=isFlag?'#ff9100':col;ctx.lineWidth=isFlag?2:1;
    ctx.beginPath();ctx.roundRect(x-bw/2,y-bh/2,bw,bh,3);ctx.stroke();
    ctx.fillStyle=isFlag?'#ff9100':col;
    ctx.fillText(t,x,y);
  });
}

function drawSymOverlay(angles,w,h) {
  const pairs=[['lShoulder','rShoulder','肩'],['lElbow','rElbow','肘'],['lHip','rHip','髋'],['lKnee','rKnee','膝']];
  const x=16, startY=h-100;
  ctx.font='10px monospace';
  pairs.forEach(([lk,rk,name],i)=>{
    const y=startY+i*18;
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(x,y,120,15);
    ctx.fillStyle='var(--dim)';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillStyle='#4a5a7a';ctx.fillText(name,x+4,y+2);
    if(angles[lk]!=null&&angles[rk]!=null){
      const d=angles[lk]-angles[rk];
      ctx.fillStyle=Math.abs(d)>5?(d>0?'#ff9100':'#448aff'):'#00e676';
      ctx.fillText(`${d>0?'◀':'▶'} ${Math.abs(d).toFixed(1)}°`,x+30,y+2);
    }
  });
}

function drawCOG(lms,w,h) {
  const ls=lms[11],rs=lms[12],lh=lms[23],rh=lms[24];
  if(!ls||!rs||!lh||!rh||ls.visibility<.4||rs.visibility<.4) return;
  const cx=((ls.x+rs.x+lh.x+rh.x)/4)*w, cy=((ls.y+rs.y+lh.y+rh.y)/4)*h;
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,20);
  g.addColorStop(0,'rgba(255,61,90,.7)');g.addColorStop(1,'rgba(255,61,90,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fillStyle='#ff3d5a';ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,h);ctx.stroke();ctx.setLineDash([]);
}

function drawTrace(lms,w,h) {
  const rw=lms[16]; // right wrist
  if(rw&&rw.visibility>.5) {
    S.tracePoints.push({x:rw.x*w,y:rw.y*h});
    if(S.tracePoints.length>C.traceMaxPoints) S.tracePoints.shift();
  }
  if(S.tracePoints.length<2) return;
  ctx.beginPath();ctx.moveTo(S.tracePoints[0].x,S.tracePoints[0].y);
  for(let i=1;i<S.tracePoints.length;i++){
    ctx.lineTo(S.tracePoints[i].x,S.tracePoints[i].y);
  }
  ctx.strokeStyle='rgba(124,91,245,.6)';ctx.lineWidth=2;ctx.stroke();
}

function drawViewBadge(w) {
  const names={front:'FRONT',side:'SIDE',full:'ALL'};
  const colors={front:'#ff9100',side:'#448aff',full:'#7c5bf5'};
  const t=names[S.view],c=colors[S.view];
  ctx.font=`bold ${Math.max(11,w/90)}px monospace`;ctx.textAlign='left';ctx.textBaseline='top';
  const m=ctx.measureText(t);
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(14,14,m.width+14,22);
  ctx.strokeStyle=c;ctx.lineWidth=1;ctx.strokeRect(14,14,m.width+14,22);
  ctx.fillStyle=c;ctx.fillText(t,21,19);
}

// ============================================================
//  UI UPDATES
// ============================================================
function buildAngleGrid() {
  const grid=document.getElementById('angleGrid');
  ANGLE_MAP.forEach(([key,name,,side])=>{
    const cell=document.createElement('div');
    cell.className=`angle-cell ${side}`;
    cell.id=`cell-${key}`;
    cell.innerHTML=`<span class="label">${name}</span><span class="value off" id="val-${key}">—</span>`;
    cell.onclick=()=>{S.enabled[key]=!S.enabled[key];cell.classList.toggle('disabled')};
    grid.appendChild(cell);
  });
}

function updateAngleGrid(angles, flags) {
  ANGLE_MAP.forEach(([key])=>{
    const el=document.getElementById(`val-${key}`);
    if(!el) return;
    const vk=VIEW_KEYS[S.view];
    const cell=document.getElementById(`cell-${key}`);
    if(vk&&!vk.includes(key)){cell.style.display='none';return;}
    cell.style.display='flex';
    if(angles[key]!=null){
      el.textContent=angles[key]+'°';
      el.className='value'+(flags.includes(key)?' warn':' active');
    } else {
      el.textContent='—';el.className='value off';
    }
  });
}

function updateSymmetry(angles) {
  [['lShoulder','rShoulder','symShoulder'],['lElbow','rElbow','symElbow'],['lHip','rHip','symHip'],['lKnee','rKnee','symKnee']].forEach(([lk,rk,id])=>{
    const el=document.getElementById(id);if(!el)return;
    if(angles[lk]==null||angles[rk]==null){el.style.width='50%';el.className='sym-fill ok';return;}
    const d=angles[lk]-angles[rk], pct=Math.max(5,Math.min(95,50+(d/90)*50));
    el.style.width=pct+'%';
    el.className='sym-fill'+(Math.abs(d)<5?' ok':d>0?' left':' right');
  });
}

function updateWarn(flags) {
  const bar=document.getElementById('warnBar');
  if(flags.length>0){bar.classList.add('show');document.getElementById('warnMsg').textContent=`${flags.length}处异常: ${flags.join(', ')}`;}
  else bar.classList.remove('show');
  document.getElementById('outlierCount').textContent=S.outlierCount;
}

function updateDetectStatus(detected) {
  document.getElementById('dotDetect').className='status-dot '+(detected?'dot-on':'dot-off');
  document.getElementById('detectText').textContent=detected?'已检测':'无人';
}

function updateFPS() {
  S.fpsFrames++;
  const now=performance.now();
  if(now-S.lastTime>=1000){S.fps=S.fpsFrames;S.fpsFrames=0;S.lastTime=now;document.getElementById('fpsText').textContent=S.fps+' fps';}
}

// ============================================================
//  CHART
// ============================================================
function initChart() {
  const chartCtx=document.getElementById('angleChart').getContext('2d');
  S.chart=new Chart(chartCtx,{
    type:'line',
    data:{labels:[],datasets:[
      {label:'左膝',data:[],borderColor:'#ff9100',borderWidth:1.5,pointRadius:0,tension:.3},
      {label:'右膝',data:[],borderColor:'#448aff',borderWidth:1.5,pointRadius:0,tension:.3},
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      scales:{x:{display:false},y:{min:0,max:180,grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#4a5a7a',font:{size:9}}}},
      plugins:{legend:{labels:{color:'#4a5a7a',font:{size:9}}}}}
  });
}

function updateChart(angles) {
  if(!S.chart) initChart();
  const ch=S.chart;
  ch.data.labels.push('');
  ch.data.datasets[0].data.push(angles.lKnee||null);
  ch.data.datasets[1].data.push(angles.rKnee||null);
  if(ch.data.labels.length>C.chartMaxPoints){ch.data.labels.shift();ch.data.datasets.forEach(d=>d.data.shift());}
  ch.update();
}

// ============================================================
//  RECORDING
// ============================================================
function toggleRec(){S.isRec?stopRec():startRec();}

function startRec(){
  S.recData=[];S.recChunks=[];S.outlierCount=0;S.recStart=performance.now();S.isRec=true;
  try{
    const mt=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
    S.mRec=new MediaRecorder(canvas.captureStream(30),{mimeType:mt});
    S.mRec.ondataavailable=e=>{if(e.data.size>0)S.recChunks.push(e.data)};S.mRec.start(100);
  }catch(e){console.warn('MediaRecorder:',e)}
  document.getElementById('btnRec').textContent='⏹ 停止';document.getElementById('btnRec').classList.add('active');
  document.getElementById('dotRec').className='status-dot dot-rec';document.getElementById('statusText').textContent='录制中';
  document.getElementById('recBadge').classList.add('show');
  document.getElementById('btnExport').disabled=true;document.getElementById('btnVideo').disabled=true;
  S.recTimer=setInterval(()=>{const el=(performance.now()-S.recStart)/1000;document.getElementById('recTime').textContent=`${String(Math.floor(el/60)).padStart(2,'0')}:${(el%60).toFixed(1).padStart(4,'0')}`;document.getElementById('frameCount').textContent=S.recData.length;},100);
}

function recordFrame(angles,flags){
  S.recData.push({time:(performance.now()-S.recStart)/1000,...angles,flags:flags.length});
}

function stopRec(){
  S.isRec=false;if(S.mRec&&S.mRec.state!=='inactive')S.mRec.stop();clearInterval(S.recTimer);
  document.getElementById('btnRec').textContent='⏺ 录制';document.getElementById('btnRec').classList.remove('active');
  document.getElementById('dotRec').className='status-dot dot-on';document.getElementById('statusText').textContent=`${S.recData.length}帧`;
  document.getElementById('recBadge').classList.remove('show');
  if(S.recData.length>0)document.getElementById('btnExport').disabled=false;
  if(S.recChunks.length>0)document.getElementById('btnVideo').disabled=false;
}

// ============================================================
//  EXPORT
// ============================================================
function exportExcel(){
  const d=S.recData;if(!d.length)return;
  const cols=['时间(s)',...ALL_KEYS.map(k=>{const m=ANGLE_MAP.find(a=>a[0]===k);return m?`${m[1]}(${k})`:k}),'异常'];
  const rows=d.map(r=>{const row=[+r.time.toFixed(3)];ALL_KEYS.forEach(k=>row.push(r[k]!=null?r[k]:null));row.push(r.flags||0);return row});
  const ws=XLSX.utils.aoa_to_sheet([cols,...rows]);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'角度数据');
  const ts=new Date();
  XLSX.writeFile(wb,`motionangle_${ts.getFullYear()}${String(ts.getMonth()+1).padStart(2,'0')}${String(ts.getDate()).padStart(2,'0')}_${String(ts.getHours()).padStart(2,'0')}${String(ts.getMinutes()).padStart(2,'0')}.xlsx`);
}

function exportVideo(){
  if(!S.recChunks.length)return;
  const blob=new Blob(S.recChunks,{type:'video/webm'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`motionangle_${Date.now()}.webm`;a.click();URL.revokeObjectURL(a.href);
}

// ============================================================
//  UI BINDINGS
// ============================================================
function bindUI(){
  // Source tabs
  document.querySelectorAll('.source-tabs button').forEach(b=>{b.addEventListener('click',()=>{
    document.querySelectorAll('.source-tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    S.source=b.dataset.src;
    if(S.source==='camera'){video.style.display='';startCamera();}
    else if(S.source==='video') loadVideoFile();
    else if(S.source==='image') loadImageFile();
  })});

  // View tabs
  document.querySelectorAll('.view-tabs button').forEach(b=>{b.addEventListener('click',()=>{
    document.querySelectorAll('.view-tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    S.view=b.dataset.v;
  })});

  // Toolbar
  document.querySelectorAll('.toolbar button').forEach(b=>{b.addEventListener('click',()=>{
    const t=b.dataset.t;S.markers[t]=!S.markers[t];b.classList.toggle('on');
    if(t==='chart'){document.getElementById('chartContainer').classList.toggle('show');}
  })});

  // Controls
  document.getElementById('btnRec').addEventListener('click',toggleRec);
  document.getElementById('btnExport').addEventListener('click',exportExcel);
  document.getElementById('btnVideo').addEventListener('click',exportVideo);
}

document.addEventListener('DOMContentLoaded',init);
</script>
