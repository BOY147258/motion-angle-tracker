<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MotionAngle Pro v3.2 — 运动分析系统</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#00f0ff;--accent2:#7c5bf5;--green:#00e676;--red:#ff3d5a;
  --orange:#ff9100;--blue:#448aff;--dim:#5a6a8a;--text:#e8eef8;
  --panel:rgba(6,8,18,.85);--border:rgba(30,50,90,.5);
  --font:-apple-system,BlinkMacSystemFont,'SF Mono','JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:#000;font-family:var(--font);color:var(--text);-webkit-user-select:none;user-select:none;touch-action:manipulation}

/* ===== EXPERIMENT SETUP PAGE ===== */
#setupPage{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:linear-gradient(135deg,#06080f 0%,#0a1628 50%,#0f0a20 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.setup-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:380px;backdrop-filter:blur(20px)}
.setup-card h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:4px}
.setup-card .sub{font-size:11px;color:var(--dim);text-align:center;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text);font:13px var(--font);outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{height:60px;resize:none}
.form-group select{appearance:none}
.start-btn{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font:14px/1 var(--font);font-weight:700;cursor:pointer;margin-top:8px;transition:transform .1s,box-shadow .2s}
.start-btn:active{transform:scale(.97)}
.start-btn:hover{box-shadow:0 0 25px rgba(0,240,255,.3)}
.setup-footer{margin-top:16px;font-size:9px;color:var(--dim);text-align:center;line-height:1.6}

/* ===== FULLSCREEN VIDEO ===== */
#videoLayer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#video{width:100%;height:100%;object-fit:cover;background:#000}
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
#videoFile{display:none}

/* ===== FLOATING PANELS ===== */
.fp{position:fixed;z-index:10;background:var(--panel);border:1px solid var(--border);border-radius:10px;backdrop-filter:blur(12px)}

/* Top status */
#topBar{top:8px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;padding:5px 14px;border-radius:16px;font-size:10px}
.logo-sm{font-weight:800;font-size:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px}
.dot-on{background:var(--green);box-shadow:0 0 4px var(--green)}.dot-off{background:var(--dim)}.dot-rec{background:var(--red);animation:p .5s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.2}}

/* Source tabs */
#srcTabs{top:8px;left:8px;display:flex;gap:2px;padding:3px 6px;border-radius:8px}
#srcTabs button{font:10px var(--font);padding:4px 8px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--dim);cursor:pointer}
#srcTabs button.on{color:var(--accent);border-color:var(--accent);background:rgba(0,240,255,.06)}

/* Angle panel - right side */
#anglePanel{top:44px;right:8px;width:165px;max-height:calc(100vh - 110px);overflow-y:auto;padding:8px;border-radius:10px}
#anglePanel::-webkit-scrollbar{width:0}
.pt{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.ai{display:flex;justify-content:space-between;align-items:center;padding:3px 5px;margin-bottom:1px;border-radius:3px;font-size:10px;cursor:pointer;border-left:2px solid transparent}
.ai.l{border-left-color:var(--orange)}.ai.r{border-left-color:var(--blue)}.ai.c{border-left-color:var(--accent2)}
.ai.dis{opacity:.2}
.ai .n{color:var(--dim);font-size:9px}.ai .v{font-weight:700;font-size:12px;font-variant-numeric:tabular-nums;min-width:44px;text-align:right}
.ai .v.on{color:var(--accent)}.ai .v.w{color:var(--orange)}.ai .v.off{color:var(--dim)}

/* View tabs inside angle panel */
.vt{display:flex;gap:2px;margin-bottom:6px}
.vt button{flex:1;font:8px var(--font);padding:3px 0;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--dim);cursor:pointer;text-align:center}
.vt button.on{color:var(--accent2);border-color:var(--accent2);background:rgba(124,91,245,.06)}

/* Bottom toolbar */
#bottomBar{bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:3px;padding:5px 10px;border-radius:10px}
#bottomBar button{font:10px var(--font);padding:5px 9px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--dim);cursor:pointer}
#bottomBar button.on{color:var(--accent);border-color:var(--accent);background:rgba(0,240,255,.05)}

/* Controls - bottom left */
#ctrlPanel{bottom:12px;left:8px;display:flex;gap:4px;padding:5px 8px;border-radius:10px}
#ctrlPanel button{font:10px var(--font);padding:5px 10px;border:1px solid var(--border);border-radius:5px;background:transparent;cursor:pointer;font-weight:600}
.rb{color:var(--red)!important;border-color:var(--red)!important}.rb.active{background:var(--red)!important;color:#fff!important}
.eb{color:var(--green)!important;border-color:var(--green)!important}.eb:hover:not(:disabled){background:var(--green)!important;color:#000!important}
.vb{color:var(--blue)!important;border-color:var(--blue)!important}.vb:hover:not(:disabled){background:var(--blue)!important;color:#000!important}
#ctrlPanel button:disabled{opacity:.2;cursor:default}

/* REC badge */
#recBadge{top:8px;right:8px;padding:4px 10px;border-radius:6px;background:rgba(255,61,90,.9);color:#fff;font-size:10px;display:none;align-items:center;gap:5px}
#recBadge.show{display:flex}

/* Symmetry - bottom right */
#symPanel{bottom:12px;right:8px;width:140px;padding:6px 8px;border-radius:8px;display:none}
#symPanel.show{display:block}
.st{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.sr{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.sr .sl{font-size:8px;color:var(--dim);width:16px;text-align:right}
.stk{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px;position:relative;overflow:hidden}
.sf{height:100%;border-radius:2px;transition:width .12s}
.sf.ok{background:var(--green)}.sf.ll{background:var(--orange)}.sf.rr{background:var(--blue)}

/* Warn */
#warnBar{top:40px;left:50%;transform:translateX(-50%);padding:4px 12px;border-radius:6px;font-size:9px;color:var(--orange);display:none;align-items:center;gap:5px}
#warnBar.show{display:flex}

/* Info bar */
#infoBar{bottom:50px;left:8px;padding:3px 8px;border-radius:5px;font-size:9px;color:var(--dim);display:flex;gap:10px}
#infoBar .hl{color:var(--text);font-weight:600}
#infoBar .rt{color:var(--red);font-weight:700}

/* Progress bar */
#progressBar{position:fixed;bottom:48px;left:10%;width:80%;height:4px;background:rgba(255,255,255,.05);border-radius:2px;z-index:10;display:none;cursor:pointer}
#progressBar.show{display:block}
#progressFill{height:100%;background:var(--accent);border-radius:2px;width:0}

/* Placeholder */
#placeholder{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;text-align:center;color:var(--dim);font-size:12px}
#placeholder .icon{font-size:48px;display:block;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(0,240,255,.3))}
.load-bar{width:180px;height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin:10px auto;overflow:hidden}
.load-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .3s}

@media(max-width:500px){
  #anglePanel{width:130px;padding:6px}
  .ai .v{font-size:11px;min-width:38px}
  #bottomBar button{padding:4px 7px;font-size:9px}
  #ctrlPanel button{padding:4px 8px;font-size:9px}
}
</style>
</head>
<body>

<!-- ===== EXPERIMENT SETUP PAGE ===== -->
<div id="setupPage">
  <div class="setup-card">
    <h1>◈ MotionAngle Pro</h1>
    <div class="sub">运动关节角度分析系统 v3.2</div>
    <div class="form-group"><label>被试编号 *</label><input type="text" id="subjectId" placeholder="如: S001"></div>
    <div class="form-group"><label>实验条件</label>
      <select id="condition">
        <option value="baseline">基线测试 Baseline</option>
        <option value="pre">干预前 Pre-test</option>
        <option value="post">干预后 Post-test</option>
        <option value="follow">随访 Follow-up</option>
        <option value="custom">自定义</option>
      </select>
    </div>
    <div class="form-group"><label>动作类型</label>
      <select id="movement">
        <option value="squat">深蹲 Squat</option>
        <option value="gait">步态 Gait</option>
        <option value="jump">跳跃 Jump</option>
        <option value="throw">投掷 Throw</option>
        <option value="sprint">冲刺 Sprint</option>
        <option value="custom">自定义</option>
      </select>
    </div>
    <div class="form-group"><label>备注</label><textarea id="notes" placeholder="实验备注（可选）"></textarea></div>
    <button class="start-btn" id="startBtn">▶ 开始实验</button>
    <div class="setup-footer">
      模型: MediaPipe BlazePose (Google) · 采样率: 50Hz 重采样<br>
      滤波: Butterworth 4th-order 6Hz low-pass · 置信度阈值: 0.6
    </div>
  </div>
</div>

<!-- ===== MAIN INTERFACE ===== -->
<div id="videoLayer"><video id="video" playsinline muted></video></div>
<canvas id="canvas"></canvas>
<input type="file" id="videoFile">

<div id="placeholder" style="display:none">
  <span class="icon">◈</span>
  <span id="placeholderText">加载中...</span>
  <div class="load-bar"><div class="load-fill" id="loadFill"></div></div>
</div>

<div class="fp" id="topBar" style="display:none">
  <span class="logo-sm">◈ MOTION</span>
  <span><span class="dot dot-off" id="dotCam"></span>CAM</span>
  <span><span class="dot dot-off" id="dotModel"></span>AI</span>
  <span><span class="dot dot-off" id="dotDet"></span><span id="detTx">—</span></span>
  <span id="fpsTx">—fps</span>
</div>

<div class="fp" id="srcTabs" style="display:none">
  <button class="on" data-src="camera">📷</button>
  <button data-src="video">🎬</button>
  <button data-src="image">🖼</button>
</div>

<div class="fp" id="recBadge"><span class="dot dot-rec"></span>REC <span id="recTimeTop">00:00</span></div>

<div class="fp" id="anglePanel" style="display:none">
  <div class="vt">
    <button class="on" data-v="front">正面</button>
    <button data-v="side">侧面</button>
    <button data-v="full">全部</button>
  </div>
  <div class="pt">◈ 实时角度</div>
  <div id="angleList"></div>
</div>

<div class="fp" id="bottomBar" style="display:none">
  <button class="on" data-t="skeleton">🦴</button>
  <button class="on" data-t="angles">📐</button>
  <button data-t="symmetry">⚖️</button>
  <button data-t="cog">🎯</button>
  <button data-t="trace">✏️</button>
</div>

<div class="fp" id="ctrlPanel" style="display:none">
  <button class="rb" id="btnRec">⏺ 录制</button>
  <button class="eb" id="btnExp" disabled>📊</button>
  <button class="vb" id="btnVid" disabled>🎬</button>
</div>

<div class="fp" id="symPanel">
  <div class="st">⚖️ 对称度</div>
  <div class="sr"><span class="sl">肩</span><div class="stk"><div class="sf ok" id="sSh" style="width:50%"></div></div></div>
  <div class="sr"><span class="sl">肘</span><div class="stk"><div class="sf ok" id="sEl" style="width:50%"></div></div></div>
  <div class="sr"><span class="sl">髋</span><div class="stk"><div class="sf ok" id="sHp" style="width:50%"></div></div></div>
  <div class="sr"><span class="sl">膝</span><div class="stk"><div class="sf ok" id="sKn" style="width:50%"></div></div></div>
</div>

<div class="fp" id="warnBar"><span class="dot" style="background:var(--orange)"></span><span id="warnMsg"></span></div>

<div class="fp" id="infoBar" style="display:none">
  <span>⏱<span class="rt" id="recTime">—</span></span>
  <span>帧<span class="hl" id="frmCnt">0</span></span>
  <span>异常<span style="color:var(--orange)" id="outCnt">0</span></span>
</div>

<div id="progressBar"><div id="progressFill"></div></div>

<script>
