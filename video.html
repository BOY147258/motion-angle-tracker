<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MotionLab Pro — 视频分析</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#05080f;--s1:#0a1628;--border:rgba(6,214,160,.12);--a1:#06d6a0;--a2:#7c5bf5;--a3:#00d4ff;--text:#e8f0ff;--dim:#4a6080;--font:'SF Mono','JetBrains Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

.toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--s1)}
.toolbar .title{font-size:13px;font-weight:700;color:var(--a1);margin-right:auto}
.toolbar button{padding:6px 12px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--text);font:11px var(--font);cursor:pointer;transition:all .2s}
.toolbar button:hover{border-color:var(--a1);color:var(--a1)}
.toolbar a{color:var(--dim);font-size:11px;text-decoration:none}
.toolbar a:hover{color:var(--a1)}

.main{flex:1;display:flex;overflow:hidden}
@media(max-width:768px){.main{flex-direction:column}}

.video-area{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
#vid{max-width:100%;max-height:100%;object-fit:contain}
#cv{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.drop-zone{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--dim);font-size:13px;gap:12px;cursor:pointer}
.drop-zone.hidden{display:none}
.drop-zone .icon{font-size:48px}
.drop-zone input{display:none}

.timeline{padding:8px 16px;border-top:1px solid var(--border);background:var(--s1);display:flex;align-items:center;gap:10px}
.timeline input[type=range]{flex:1;accent-color:var(--a1)}
.timeline .time{font-size:11px;color:var(--dim);min-width:80px;text-align:center}
.timeline button{padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text);font:11px var(--font);cursor:pointer}
.timeline button:hover{border-color:var(--a1)}

.side-panel{width:320px;min-width:320px;background:var(--s1);border-left:1px solid var(--border);overflow-y:auto;padding:12px 16px}
@media(max-width:768px){.side-panel{width:100%;min-width:0;max-height:35vh;border-left:none;border-top:1px solid var(--border)}}
.side-panel h3{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:8px}
.angle-list{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:16px}
.a-item{background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);border-radius:5px;padding:6px 8px;display:flex;justify-content:space-between;align-items:center}
.a-item .n{font-size:10px;color:var(--dim)}.a-item .v{font-size:14px;font-weight:700;color:var(--a1)}
.chart-area{margin-top:12px}
.chart-area canvas{width:100%;height:120px;border:1px solid var(--border);border-radius:6px;background:rgba(0,0,0,.3)}
</style>
</head>
<body>

<div class="toolbar">
  <span class="title">⟡ 视频分析</span>
  <button onclick="document.getElementById('file-input').click()">📂 导入视频</button>
  <button id="btn-analyze" onclick="analyzeAll()">🔍 全帧分析</button>
  <a href="index.html">← 返回</a>
</div>

<div class="main">
  <div class="video-area">
    <video id="vid" playsinline muted></video>
    <canvas id="cv"></canvas>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <span class="icon">🎬</span>
      <span>拖入视频文件或点击选择</span>
      <span style="font-size:10px">支持 MP4 / WebM / MOV</span>
      <input type="file" id="file-input" accept="video/*">
    </div>
  </div>
  <div class="side-panel">
    <h3>📐 当前帧角度</h3>
    <div class="angle-list" id="angle-list"></div>
    <h3>📈 角度变化曲线</h3>
    <div class="chart-area"><canvas id="chart" height="120"></canvas></div>
    <div style="margin-top:8px;font-size:9px;color:var(--dim)" id="chart-info">分析后显示曲线</div>
  </div>
</div>

<div class="timeline">
  <button id="btn-play" onclick="togglePlay()">▶</button>
  <button onclick="stepFrame(-1)">◀</button>
  <input type="range" id="seek" min="0" max="100" value="0" step="0.1" oninput="seekTo(this.value)">
  <button onclick="stepFrame(1)">▶</button>
  <span class="time" id="time-display">0:00 / 0:00</span>
</div>

<script>
const ANGLES=[['lShoulder','左肩',[13,11,23]],['rShoulder','右肩',[14,12,24]],['lElbow','左肘',[11,13,15]],['rElbow','右肘',[12,14,16]],['lHip','左髋',[11,23,25]],['rHip','右髋',[12,24,26]],['lKnee','左膝',[23,25,27]],['rKnee','右膝',[24,26,28]],['lAnkle','左踝',[25,27,31]],['rAnkle','右踝',[26,28,32]]];
const CONNS=[[11,13],[13,15],[12,14],[14,16],[11,12],[11,23],[12,24],[23,24],[23,25],[24,26],[25,27],[26,28]];

let vid=document.getElementById('vid'),cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let pose=null,playing=false,allFrameData=[];

// File input
document.getElementById('file-input').addEventListener('change',e=>{if(e.target.files[0])loadVideo(e.target.files[0])});
// Drag & drop
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='var(--a1)'});
dz.addEventListener('dragleave',()=>{dz.style.borderColor=''});
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='';if(e.dataTransfer.files[0])loadVideo(e.dataTransfer.files[0])});

function loadVideo(file){
  const url=URL.createObjectURL(file);vid.src=url;vid.load();
  vid.onloadedmetadata=()=>{document.getElementById('drop-zone').classList.add('hidden');resize();initPose();updateTime()};
}
function resize(){cv.width=vid.videoWidth||vid.clientWidth;cv.height=vid.videoHeight||vid.clientHeight}

function initPose(){
  if(pose)return;
  pose=new Pose({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`});
  pose.setOptions({modelComplexity:1,smoothLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
  pose.onResults(onResults);
}

function onResults(r){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(!r.poseLandmarks)return;
  const lms=r.poseLandmarks,w=cv.width,h=cv.height;
  // Draw skeleton
  ctx.strokeStyle='rgba(0,212,255,.4)';ctx.lineWidth=2;
  CONNS.forEach(([a,b])=>{const la=lms[a],lb=lms[b];if(la.visibility>.4&&lb.visibility>.4){ctx.beginPath();ctx.moveTo(la.x*w,la.y*h);ctx.lineTo(lb.x*w,lb.y*h);ctx.stroke()}});
  lms.forEach(p=>{if(p.visibility>.4){ctx.beginPath();ctx.arc(p.x*w,p.y*h,3,0,Math.PI*2);ctx.fillStyle='rgba(0,212,255,.7)';ctx.fill()}});
  // Angles
  const ang={};const list=document.getElementById('angle-list');list.innerHTML='';
  ANGLES.forEach(([key,name,pts])=>{
    const [a,b,c]=pts;const la=lms[a],lb=lms[b],lc=lms[c];
    if(la.visibility>.4&&lb.visibility>.4&&lc.visibility>.4){
      const v=calcAngle(la,lb,lc);ang[key]=v;
      list.innerHTML+=`<div class="a-item"><span class="n">${name}</span><span class="v">${v}°</span></div>`;
      // Arc
      const bx=lb.x*w,by=lb.y*h,s=Math.atan2(la.y*h-by,la.x*w-bx),e=Math.atan2(lc.y*h-by,lc.x*w-bx);
      ctx.beginPath();ctx.arc(bx,by,18,s,e,v>180);ctx.strokeStyle='rgba(6,214,160,.7)';ctx.lineWidth=2;ctx.stroke();
    }
  });
  return ang;
}
function calcAngle(a,b,c){const ba={x:a.x-b.x,y:a.y-b.y},bc={x:c.x-b.x,y:c.y-b.y};const dot=ba.x*bc.x+ba.y*bc.y;const m=Math.sqrt(ba.x**2+ba.y**2)*Math.sqrt(bc.x**2+bc.y**2);return Math.round(Math.acos(Math.max(-1,Math.min(1,dot/m)))*180/Math.PI)}

// Playback
function togglePlay(){if(!vid.src)return;playing?vid.pause():vid.play();playing=!playing;document.getElementById('btn-play').textContent=playing?'⏸':'▶';if(playing)playLoop()}
function playLoop(){if(!playing)return;analyzeFrame();document.getElementById('seek').value=(vid.currentTime/vid.duration*100)||0;updateTime();requestAnimationFrame(playLoop)}
function seekTo(v){vid.currentTime=vid.duration*(v/100);analyzeFrame();updateTime()}
function stepFrame(dir){vid.currentTime=Math.max(0,Math.min(vid.duration,vid.currentTime+dir/30));analyzeFrame();document.getElementById('seek').value=(vid.currentTime/vid.duration*100);updateTime()}
function analyzeFrame(){if(vid.readyState>=2)pose.send({image:vid})}
function updateTime(){const c=vid.currentTime||0,d=vid.duration||0;document.getElementById('time-display').textContent=`${fmt(c)} / ${fmt(d)}`}
function fmt(s){return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`}

// Full analysis
async function analyzeAll(){
  if(!vid.duration)return;
  allFrameData=[];const step=1/15;const total=vid.duration;let t=0;
  document.getElementById('chart-info').textContent='分析中...';
  for(t=0;t<total;t+=step){
    vid.currentTime=t;
    await new Promise(r=>vid.onseeked=r);
    const ang=await new Promise(resolve=>{
      pose.onResults=r=>{const a=onResults(r);resolve(a)};
      pose.send({image:vid});
    });
    if(ang)allFrameData.push({t,...ang});
  }
  document.getElementById('chart-info').textContent=`已分析 ${allFrameData.length} 帧`;
  drawChart();
  // restore normal handler
  pose.onResults=onResults;
}
function drawChart(){
  const chart=document.getElementById('chart');const c=chart.getContext('2d');
  chart.width=chart.clientWidth*2;chart.height=240;
  c.fillStyle='rgba(0,0,0,.5)';c.fillRect(0,0,chart.width,chart.height);
  if(!allFrameData.length)return;
  const colors=['#06d6a0','#7c5bf5','#00d4ff','#f59e0b','#ef4444','#22c55e'];
  const keys=['lKnee','rKnee','lElbow','rElbow'];
  const w=chart.width,h=chart.height,pad=20;
  keys.forEach((key,ki)=>{
    c.strokeStyle=colors[ki%colors.length];c.lineWidth=1.5;c.beginPath();
    allFrameData.forEach((d,i)=>{
      if(d[key]==null)return;
      const x=pad+(i/(allFrameData.length-1))*(w-pad*2);
      const y=h-pad-(d[key]/180)*(h-pad*2);
      i===0?c.moveTo(x,y):c.lineTo(x,y);
    });
    c.stroke();
  });
  // Legend
  c.font='10px monospace';
  keys.forEach((k,i)=>{c.fillStyle=colors[i];c.fillText(ANGLES.find(a=>a[0]===k)?.[1]||k,pad+i*60,14)});
}
</script>
</body>
</html>
